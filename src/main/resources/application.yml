server:
  port: 8080

spring:
  application:
    name: aws-ai-demos
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

aws:
  region: us-east-1
  s3:
    bucket-name: jon-aws-ai-demos

bedrock:
  base-url: ${BEDROCK_BASE_URL:}
  api-key: ${BEDROCK_API_KEY:}
  agent:
    id: ${BEDROCK_AGENT_ID:}
    alias-id: ${BEDROCK_AGENT_ALIAS_ID:}

logging:
  level:
    com.skillstorm.awsdemos: DEBUG
